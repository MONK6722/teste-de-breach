<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consulta de Clima - OpenWeatherMap</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #2d1b4e 0%, #1a0f2e 50%, #3d2463 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      color: #fff;
    }

    .container {
      background: rgba(93, 39, 209, 0.15);
      backdrop-filter: blur(15px);
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 8px 32px 0 rgba(93, 39, 209, 0.3);
      border: 1px solid rgba(147, 51, 234, 0.3);
      animation: slideIn 0.5s ease;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(-20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    h1 {
      margin-bottom: 30px;
      font-size: 2.5rem;
      text-align: center;
      font-weight: 300;
      letter-spacing: 1px;
      color: #e0d5ff;
    }

    .search-container {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      justify-content: center;
    }

    input {
      padding: 12px 20px;
      width: 280px;
      border: none;
      border-radius: 10px;
      outline: none;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.95);
      color: #2d1b4e;
      transition: all 0.3s ease;
    }

    input::placeholder {
      color: #9370db;
    }

    input:focus {
      background: #fff;
      box-shadow: 0 4px 15px rgba(147, 51, 234, 0.4);
    }

    button {
      padding: 12px 30px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
      color: #fff;
      cursor: pointer;
      font-weight: bold;
      font-size: 1rem;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(124, 58, 237, 0.4);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(124, 58, 237, 0.6);
      background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%);
    }

    button:active {
      transform: translateY(0);
    }

    #resultado {
      min-height: 200px;
      text-align: center;
      animation: fadeIn 0.5s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .loading {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 200px;
    }

    .spinner {
      border: 4px solid rgba(147, 51, 234, 0.3);
      border-top: 4px solid #a78bfa;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .weather-card {
      background: rgba(124, 58, 237, 0.1);
      border-radius: 15px;
      padding: 30px;
      border: 1px solid rgba(147, 51, 234, 0.2);
      max-height: 80vh;
      overflow-y: auto;
    }

    .weather-card::-webkit-scrollbar {
      width: 8px;
    }

    .weather-card::-webkit-scrollbar-track {
      background: rgba(147, 51, 234, 0.1);
      border-radius: 10px;
    }

    .weather-card::-webkit-scrollbar-thumb {
      background: rgba(147, 51, 234, 0.3);
      border-radius: 10px;
    }

    .weather-card::-webkit-scrollbar-thumb:hover {
      background: rgba(147, 51, 234, 0.5);
    }

    .city-info {
      margin-bottom: 20px;
    }

    .state-info {
      font-size: 1.1rem;
      opacity: 0.95;
      margin-bottom: 10px;
      color: #e0d5ff;
    }

    .coordinates {
      font-size: 0.9rem;
      opacity: 0.85;
      font-family: 'Courier New', monospace;
      background: rgba(147, 51, 234, 0.15);
      padding: 8px 12px;
      border-radius: 8px;
      margin-top: 10px;
      border: 1px solid rgba(147, 51, 234, 0.2);
    }

    .weather-icon {
      font-size: 4rem;
      margin: 20px 0;
    }

    .temperature {
      font-size: 3.5rem;
      font-weight: bold;
      margin: 15px 0;
      text-shadow: 0 2px 10px rgba(124, 58, 237, 0.5);
      color: #fbbf24;
    }

    .description {
      font-size: 1.2rem;
      text-transform: capitalize;
      margin-bottom: 25px;
      font-style: italic;
      opacity: 0.9;
      color: #d8c5f8;
    }

    .details-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 15px;
      margin-top: 25px;
    }

    .detail-box {
      background: rgba(147, 51, 234, 0.12);
      padding: 15px;
      border-radius: 10px;
      border: 1px solid rgba(147, 51, 234, 0.25);
      transition: all 0.3s ease;
    }

    .detail-box:hover {
      background: rgba(147, 51, 234, 0.2);
      transform: translateY(-5px);
      border-color: rgba(147, 51, 234, 0.4);
    }

    .detail-label {
      font-size: 0.9rem;
      opacity: 0.8;
      margin-bottom: 8px;
      color: #c4b5fd;
    }

    .detail-value {
      font-size: 1.5rem;
      font-weight: bold;
      color: #e0d5ff;
    }

    .erro {
      color: #fca5a5;
      font-size: 1.1rem;
      padding: 20px;
      background: rgba(220, 38, 38, 0.15);
      border-radius: 10px;
      border-left: 4px solid #fca5a5;
    }

    .info-text {
      opacity: 0.9;
      font-size: 1rem;
      color: #d8c5f8;
    }

    @media (max-width: 600px) {
      .container {
        padding: 25px;
        max-width: 100%;
      }

      h1 {
        font-size: 2rem;
      }

      input {
        width: 100%;
      }

      .search-container {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      .temperature {
        font-size: 2.5rem;
      }

      .state-info {
        font-size: 1.5rem;
      }

      .details-grid {
        grid-template-columns: 1fr;
      }

      .weather-card {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🌤️ Clima Agora</h1>
    
    <div class="search-container">
      <input type="text" id="cidadeInput" placeholder="Digite o nome da cidade" onkeypress="handleKeyPress(event)">
      <button onclick="buscarClima()">Buscar</button>
    </div>

    <div id="resultado">
      <p class="info-text">Digite uma cidade para ver o clima atual.</p>
    </div>
  </div>

  <script>
    const apiKey = "5104515b692a20f0186e41d6757103ee";

    // Mapa de ícones climáticos
    const iconMap = {
      '01d': '☀️',
      '01n': '🌙',
      '02d': '⛅',
      '02n': '🌤️',
      '03d': '☁️',
      '03n': '☁️',
      '04d': '☁️',
      '04n': '☁️',
      '09d': '🌧️',
      '09n': '🌧️',
      '10d': '🌦️',
      '10n': '🌧️',
      '11d': '⛈️',
      '11n': '⛈️',
      '13d': '❄️',
      '13n': '❄️',
      '50d': '🌫️',
      '50n': '🌫️'
    };

    function handleKeyPress(event) {
      if (event.key === 'Enter') {
        buscarClima();
      }
    }

    function formatarHora(timestamp) {
      const data = new Date(timestamp * 1000);
      return data.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function buscarClima() {
      const cidade = document.getElementById("cidadeInput").value.trim();
      const resultado = document.getElementById("resultado");

      if (!cidade) {
        resultado.innerHTML = "<p class='erro'>⚠️ Por favor, digite uma cidade.</p>";
        return;
      }

      const url = `https://api.openweathermap.org/data/2.5/weather?q=${encodeURIComponent(cidade)}&appid=${apiKey}&units=metric&lang=pt_br`;

      resultado.innerHTML = '<div class="loading"><div class="spinner"></div></div>';

      fetch(url)
        .then(response => response.json())
        .then(data => {
          console.log(data);
          if (data.cod != 200) {
            resultado.innerHTML = `<p class='erro'>❌ ${data.message || 'Cidade não encontrada.'}</p>`;
          } else {
            const icon = iconMap[data.weather[0].icon] || '🌡️';
            const velocidadeKmh = (data.wind.speed * 3.6).toFixed(1);
            const latitude = data.coord.lat.toFixed(4);
            const longitude = data.coord.lon.toFixed(4);
            const visibilidade = (data.visibility / 1000).toFixed(1);
            const nascer = formatarHora(data.sys.sunrise);
            const poer = formatarHora(data.sys.sunset);
            
            // Determinar estado (para cidades brasileiras)
            let estadoInfo = '';
            if (data.sys.country === 'BR') {
              estadoInfo = `<div class="state-info">📍 ${data.name}</div>`;
            } else {
              estadoInfo = `<div class="state-info">🌍 ${data.name}, ${data.sys.country}</div>`;
            }
            
            resultado.innerHTML = `
              <div class="weather-card">
                <div class="city-info">
                  ${estadoInfo}
                  <div class="coordinates">
                    📌 Lat: ${latitude}° | Lon: ${longitude}°
                  </div>
                </div>
                
                <div class="weather-icon">${icon}</div>
                
                <div class="temperature">${Math.round(data.main.temp)}°C</div>
                
                <div class="description">${data.weather[0].description}</div>
                
                <div class="details-grid">
                  <div class="detail-box">
                    <div class="detail-label">💧 Umidade</div>
                    <div class="detail-value">${data.main.humidity}%</div>
                  </div>
                  
                  <div class="detail-box">
                    <div class="detail-label">💨 Vento</div>
                    <div class="detail-value">${velocidadeKmh} km/h</div>
                  </div>
                  
                  <div class="detail-box">
                    <div class="detail-label">🌡️ Sensação</div>
                    <div class="detail-value">${Math.round(data.main.feels_like)}°C</div>
                  </div>
                  
                  <div class="detail-box">
                    <div class="detail-label">🔽 Pressão</div>
                    <div class="detail-value">${data.main.pressure} hPa</div>
                  </div>

                  <div class="detail-box">
                    <div class="detail-label">👁️ Visibilidade</div>
                    <div class="detail-value">${visibilidade} km</div>
                  </div>
                  
                  <div class="detail-box">
                    <div class="detail-label">☁️ Nuvens</div>
                    <div class="detail-value">${data.clouds.all}%</div>
                  </div>

                  <div class="detail-box">
                    <div class="detail-label">🌅 Nascer</div>
                    <div class="detail-value">${nascer}</div>
                  </div>
                  
                  <div class="detail-box">
                    <div class="detail-label">🌇 Pôr</div>
                    <div class="detail-value">${poer}</div>
                  </div>

                  <div class="detail-box">
                    <div class="detail-label">🔥 Máxima</div>
                    <div class="detail-value">${Math.round(data.main.temp_max)}°C</div>
                  </div>
                  
                  <div class="detail-box">
                    <div class="detail-label">❄️ Mínima</div>
                    <div class="detail-value">${Math.round(data.main.temp_min)}°C</div>
                  </div>
                </div>
              </div>
            `;
          }
        })
        .catch(error => {
          console.log("Erro ao buscar clima: " + error);
          resultado.innerHTML = "<p class='erro'>❌ Erro ao buscar dados. Verifique sua conexão e tente novamente.</p>";
        });
    }
  </script>
</body>
</html>
